---
layout: default
---
<div class="container">
  <article>
    <header class="article-header">
      <div class="article-meta">Project · {{ page.date | date: "%Y" }}</div>
      <h1>{{ page.title }}</h1>
      <p class="hero-lede">{{ page.description }}</p>
      <div class="entry-links">
        {% if page.github %}<a href="{{ page.github }}">github</a>{% endif %}
        {% if page.demo %}<a href="{{ page.demo }}">demo</a>{% endif %}
        {% if page.paper %}<a href="{{ page.paper }}">paper</a>{% endif %}
      </div>
    </header>
    <div class="article-content">
      {{ content }}
    </div>
  </article>
</div>
