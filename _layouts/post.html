---
layout: default
---
<div class="container">
  <article>
    <header class="article-header">
      <div class="article-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.tags %} · {{ page.tags | join: " · " }}{% endif %}</div>
      <h1>{{ page.title }}</h1>
    </header>
    <div class="article-content">
      {{ content }}
    </div>
  </article>
</div>
